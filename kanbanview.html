<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATE-IA — Kanban de Antecipações</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue-dark: #1A3A5C; --blue-mid: #2E6DA4; --blue-50: #E6F1FB;
    --green: #1D7044; --green-light: #D6F0E0;
    --amber: #854F0B; --amber-light: #FFF2CC;
    --red: #A32D2D; --red-light: #FCEBEB;
    --purple: #4A2C8A; --purple-light: #EDE9FB;
    --gray-100: #F2F2F2; --gray-200: #E0E0E0; --gray-500: #888; --gray-700: #444;
    --font: 'Segoe UI', Arial, sans-serif;
    --radius: 10px; --radius-sm: 6px;
  }
  body { font-family: var(--font); background: #f0f2f5; color: var(--gray-700); min-height: 100vh; }

  /* ── HEADER ──────────────────────────────────────────────────────── */
  .header { background: var(--blue-dark); color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .search-box { background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25); border-radius: var(--radius-sm); padding: 7px 12px; color: #fff; font-size: 13px; font-family: var(--font); outline: none; width: 220px; }
  .search-box::placeholder { color: rgba(255,255,255,.5); }
  .search-box:focus { border-color: rgba(255,255,255,.6); }
  .filter-sel { background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25); border-radius: var(--radius-sm); padding: 7px 10px; color: #fff; font-size: 13px; font-family: var(--font); outline: none; cursor: pointer; }
  .filter-sel option { color: #333; background: #fff; }
  .btn-refresh { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); border-radius: var(--radius-sm); padding: 7px 14px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s; }
  .btn-refresh:hover { background: rgba(255,255,255,.25); }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .live-label { font-size: 11px; opacity: .8; display: flex; align-items: center; }

  /* ── STATS BAR ───────────────────────────────────────────────────── */
  .stats-bar { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 10px 24px; display: flex; gap: 20px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-num { font-size: 20px; font-weight: 700; color: var(--blue-dark); line-height: 1; }
  .stat-lbl { font-size: 10px; color: var(--gray-500); text-transform: uppercase; letter-spacing: .04em; }
  .stat-sep { width: 1px; background: var(--gray-200); align-self: stretch; }

  /* ── BOARD ───────────────────────────────────────────────────────── */
  .board-wrap { overflow-x: auto; padding: 20px 24px 40px; }
  .board { display: flex; gap: 14px; min-width: max-content; align-items: flex-start; }

  /* ── COLUNA ──────────────────────────────────────────────────────── */
  .col { width: 280px; border-radius: var(--radius); background: #e8eaed; display: flex; flex-direction: column; max-height: calc(100vh - 160px); }
  .col-header { padding: 12px 14px 10px; border-radius: var(--radius) var(--radius) 0 0; display: flex; align-items: center; justify-content: space-between; }
  .col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
  .col-count { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
  .col-body { padding: 8px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; min-height: 80px; }

  /* Cores por coluna */
  .col-aguardando .col-header { background: #dde3ea; }
  .col-aguardando .col-title  { color: #4a5568; }
  .col-aguardando .col-count  { background: #a0aec0; color: #fff; }

  .col-comercial .col-header { background: #D6E4F0; }
  .col-comercial .col-title  { color: var(--blue-dark); }
  .col-comercial .col-count  { background: var(--blue-mid); color: #fff; }

  .col-pcp .col-header { background: var(--amber-light); }
  .col-pcp .col-title  { color: var(--amber); }
  .col-pcp .col-count  { background: var(--amber); color: #fff; }

  .col-compras .col-header { background: var(--purple-light); }
  .col-compras .col-title  { color: var(--purple); }
  .col-compras .col-count  { background: var(--purple); color: #fff; }

  .col-aprovado .col-header { background: var(--green-light); }
  .col-aprovado .col-title  { color: var(--green); }
  .col-aprovado .col-count  { background: var(--green); color: #fff; }

  .col-reprovado .col-header { background: var(--red-light); }
  .col-reprovado .col-title  { color: var(--red); }
  .col-reprovado .col-count  { background: var(--red); color: #fff; }

  /* ── CARD ────────────────────────────────────────────────────────── */
  .card { background: #fff; border-radius: var(--radius-sm); border: 1px solid var(--gray-200); padding: 12px; cursor: pointer; transition: box-shadow .15s, transform .1s; user-select: none; }
  .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); transform: translateY(-1px); }
  .card.dragging { opacity: .5; transform: rotate(1deg); }
  .card-prot { font-size: 11px; font-weight: 700; color: var(--blue-mid); letter-spacing: .04em; margin-bottom: 6px; }
  .card-rep  { font-size: 12px; font-weight: 600; color: var(--gray-700); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-pedido { font-size: 11px; color: var(--gray-500); margin-bottom: 8px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; }
  .tag-urg-Alta   { background: var(--red-light);    color: var(--red); }
  .tag-urg-Média  { background: var(--amber-light);  color: var(--amber); }
  .tag-urg-Baixa  { background: var(--green-light);  color: var(--green); }
  .tag-prazo { background: var(--blue-50); color: var(--blue-dark); }
  .tag-antec { background: #FFF2CC; color: #854F0B; }
  .card-prods { font-size: 11px; color: var(--gray-500); margin-bottom: 8px; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 1px solid var(--gray-100); }
  .card-data { font-size: 10px; color: var(--gray-500); }
  .card-move-btn { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 6px; border: 1px solid var(--gray-200); background: var(--gray-100); color: var(--gray-700); cursor: pointer; transition: all .15s; }
  .card-move-btn:hover { background: var(--blue-50); border-color: var(--blue-mid); color: var(--blue-mid); }

  /* ── DROP ZONE ───────────────────────────────────────────────────── */
  .col-body.drag-over { background: rgba(46,109,164,.08); border: 2px dashed var(--blue-mid); border-radius: var(--radius-sm); }

  /* ── MODAL ───────────────────────────────────────────────────────── */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center; padding: 16px; }
  .modal-bg.open { display:flex; }
  .modal { background:#fff; border-radius: var(--radius); width:100%; max-width:560px; max-height:90vh; overflow-y:auto; }
  .modal-header { background: var(--blue-dark); color:#fff; padding:16px 20px; border-radius: var(--radius) var(--radius) 0 0; display:flex; align-items:center; justify-content:space-between; }
  .modal-header h3 { font-size:15px; font-weight:600; }
  .modal-close { background:none; border:none; color:#fff; font-size:20px; cursor:pointer; line-height:1; }
  .modal-body { padding:20px; }
  .modal-section { margin-bottom:16px; }
  .modal-section h4 { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--gray-500); margin-bottom:8px; }
  .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .modal-field { font-size:13px; }
  .modal-field span { display:block; font-size:11px; color:var(--gray-500); margin-bottom:2px; }
  .modal-field b { color:var(--gray-700); }
  .prod-list { display:flex; flex-direction:column; gap:4px; }
  .prod-item { background:var(--gray-100); border-radius:4px; padding:5px 10px; font-size:12px; display:flex; justify-content:space-between; }
  .status-track { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .status-pill { font-size:11px; font-weight:600; padding:4px 12px; border-radius:10px; }
  .status-pill.pendente   { background:#e8eaed; color:#4a5568; }
  .status-pill.em-analise { background:var(--blue-50); color:var(--blue-dark); }
  .status-pill.aprovado   { background:var(--green-light); color:var(--green); }
  .status-pill.reprovado  { background:var(--red-light); color:var(--red); }
  .move-section { background:var(--gray-100); border-radius:var(--radius-sm); padding:14px; }
  .move-section h4 { font-size:12px; font-weight:600; color:var(--gray-700); margin-bottom:10px; }
  .move-cols { display:flex; gap:8px; flex-wrap:wrap; }
  .move-col-btn { padding:8px 14px; font-size:12px; font-weight:600; border-radius:var(--radius-sm); border:1.5px solid var(--gray-200); background:#fff; cursor:pointer; transition:all .15s; }
  .move-col-btn:hover { border-color:var(--blue-mid); background:var(--blue-50); color:var(--blue-dark); }
  .move-col-btn.current { border-color:var(--blue-mid); background:var(--blue-50); color:var(--blue-dark); }
  .parecer-area { margin-top:10px; }
  .parecer-area label { font-size:12px; color:var(--gray-500); display:block; margin-bottom:4px; }
  .parecer-area textarea { width:100%; border:1px solid var(--gray-200); border-radius:var(--radius-sm); padding:8px; font-size:13px; font-family:var(--font); resize:vertical; min-height:60px; outline:none; }
  .parecer-area textarea:focus { border-color:var(--blue-mid); }
  .modal-footer { padding:16px 20px; border-top:1px solid var(--gray-200); display:flex; gap:10px; justify-content:flex-end; }
  .btn { padding:9px 20px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--gray-200); background:var(--gray-100); color:var(--gray-700); transition:all .15s; }
  .btn:hover { background:var(--gray-200); }
  .btn.primary { background:var(--blue-mid); color:#fff; border-color:var(--blue-mid); }
  .btn.primary:hover { background:var(--blue-dark); }
  .btn.success { background:var(--green); color:#fff; border-color:var(--green); }
  .btn.danger  { background:var(--red);   color:#fff; border-color:var(--red); }

  /* ── EMPTY / LOADING ─────────────────────────────────────────────── */
  .empty-col { text-align:center; padding:20px 10px; color:var(--gray-500); font-size:12px; }
  .loading-wrap { display:flex; align-items:center; justify-content:center; height:200px; gap:10px; color:var(--gray-500); font-size:14px; }
  .spinner { width:20px; height:20px; border:2px solid var(--gray-200); border-top-color:var(--blue-mid); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .toast { position:fixed; bottom:24px; right:24px; background:var(--blue-dark); color:#fff; padding:12px 20px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; z-index:9999; transform:translateY(80px); opacity:0; transition:all .3s; }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.success { background:var(--green); }
  .toast.error   { background:var(--red); }
</style>
</head>
<body>

<div class="header">
  <h1>GATE-IA — Acompanhamento de Antecipações</h1>
  <div class="header-right">
    <span class="live-label"><span class="live-dot"></span>Tempo real</span>
    <span id="modo-badge" style="font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25)"></span>
    <input class="search-box" id="search" placeholder="Buscar protocolo ou representante..." oninput="renderBoard()" />
    <select class="filter-sel" id="filter-urg" onchange="renderBoard()">
      <option value="">Todas urgências</option>
      <option>Alta</option>
      <option>Média</option>
      <option>Baixa</option>
    </select>
    <button class="btn-refresh" onclick="carregarDados()">↻ Atualizar</button>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat"><div class="stat-num" id="st-total">—</div><div class="stat-lbl">Total</div></div>
  <div class="stat-sep"></div>
  <div class="stat"><div class="stat-num" id="st-alta" style="color:var(--red)">—</div><div class="stat-lbl">Urgência Alta</div></div>
  <div class="stat-sep"></div>
  <div class="stat"><div class="stat-num" id="st-andamento" style="color:var(--amber)">—</div><div class="stat-lbl">Em andamento</div></div>
  <div class="stat-sep"></div>
  <div class="stat"><div class="stat-num" id="st-aprovado" style="color:var(--green)">—</div><div class="stat-lbl">Aprovados</div></div>
  <div class="stat-sep"></div>
  <div class="stat"><div class="stat-num" id="st-reprovado" style="color:var(--red)">—</div><div class="stat-lbl">Reprovados</div></div>
</div>

<div id="loading-wrap" class="loading-wrap"><div class="spinner"></div> Carregando solicitações...</div>

<div class="board-wrap" id="board-wrap" style="display:none">
  <div class="board" id="board">

    <div class="col col-aguardando" id="col-Aguardando análise" ondragover="onDragOver(event,this)" ondrop="onDrop(event,'Aguardando análise')">
      <div class="col-header"><span class="col-title">Aguardando análise</span><span class="col-count" id="cnt-Aguardando análise">0</span></div>
      <div class="col-body" id="body-Aguardando análise"></div>
    </div>

    <div class="col col-comercial" id="col-Em análise — Comercial" ondragover="onDragOver(event,this)" ondrop="onDrop(event,'Em análise — Comercial')">
      <div class="col-header"><span class="col-title">Comercial</span><span class="col-count" id="cnt-Em análise — Comercial">0</span></div>
      <div class="col-body" id="body-Em análise — Comercial"></div>
    </div>

    <div class="col col-pcp" id="col-Em análise — PCP" ondragover="onDragOver(event,this)" ondrop="onDrop(event,'Em análise — PCP')">
      <div class="col-header"><span class="col-title">PCP</span><span class="col-count" id="cnt-Em análise — PCP">0</span></div>
      <div class="col-body" id="body-Em análise — PCP"></div>
    </div>

    <div class="col col-compras" id="col-Em análise — Compras" ondragover="onDragOver(event,this)" ondrop="onDrop(event,'Em análise — Compras')">
      <div class="col-header"><span class="col-title">Compras</span><span class="col-count" id="cnt-Em análise — Compras">0</span></div>
      <div class="col-body" id="body-Em análise — Compras"></div>
    </div>

    <div class="col col-aprovado" id="col-Aprovado" ondragover="onDragOver(event,this)" ondrop="onDrop(event,'Aprovado')">
      <div class="col-header"><span class="col-title">Aprovado</span><span class="col-count" id="cnt-Aprovado">0</span></div>
      <div class="col-body" id="body-Aprovado"></div>
    </div>

    <div class="col col-reprovado" id="col-Reprovado" ondragover="onDragOver(event,this)" ondrop="onDrop(event,'Reprovado')">
      <div class="col-header"><span class="col-title">Reprovado</span><span class="col-count" id="cnt-Reprovado">0</span></div>
      <div class="col-body" id="body-Reprovado"></div>
    </div>

  </div>
</div>

<!-- MODAL DE DETALHES -->
<div class="modal-bg" id="modal-bg" onclick="fecharModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-titulo">—</h3>
      <button class="modal-close" onclick="fecharModalBtn()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn" onclick="fecharModalBtn()">Fechar</button>
      ${ADMIN ? '<button class="btn primary" id="btn-salvar-modal" onclick="salvarMovimentacao()">Confirmar movimentação</button>' : ''}
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://ixpvcpmwebcwjjcbssfo.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4cHZjcG13ZWJjd2pqY2Jzc2ZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTI4ODQsImV4cCI6MjA5MTU4ODg4NH0.fyDz-uxM-AVK8G9lW2kjchCubifr1ySjugjp9yvKtEg';
const SB_H  = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };

const COLUNAS = ['Aguardando análise','Em análise — Comercial','Em análise — PCP','Em análise — Compras','Aprovado','Reprovado'];
const ADMIN = new URLSearchParams(window.location.search).get('modo') === 'admin';

let dados = [];
let produtos = {};
let cardAtual = null;
let novoStatus = null;
let dragProtocolo = null;

// ─── CARREGAR DADOS ───────────────────────────────────────────────────────────
async function carregarDados() {
  try {
    const [resSol, resProd] = await Promise.all([
      fetch(SB_URL + '/rest/v1/solicitacoes?select=*&order=created_at.desc', { headers: SB_H }),
      fetch(SB_URL + '/rest/v1/solicitacao_produtos?select=*', { headers: SB_H })
    ]);
    dados   = await resSol.json();
    const prods = await resProd.json();
    produtos = {};
    prods.forEach(p => {
      if (!produtos[p.protocolo]) produtos[p.protocolo] = [];
      produtos[p.protocolo].push(p);
    });
    document.getElementById('loading-wrap').style.display = 'none';
    document.getElementById('board-wrap').style.display   = 'block';
    renderBoard();
  } catch(e) {
    document.getElementById('loading-wrap').innerHTML = '<span style="color:#A32D2D">Erro ao carregar dados. Verifique a conexão.</span>';
    console.error(e);
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderBoard() {
  const busca   = document.getElementById('search').value.toLowerCase();
  const filtUrg = document.getElementById('filter-urg').value;

  const filtrados = dados.filter(s => {
    const matchBusca = !busca || s.protocolo.toLowerCase().includes(busca) || (s.representante||'').toLowerCase().includes(busca);
    const matchUrg   = !filtUrg || s.urgencia === filtUrg;
    return matchBusca && matchUrg;
  });

  // stats
  document.getElementById('st-total').textContent    = dados.length;
  document.getElementById('st-alta').textContent     = dados.filter(s=>s.urgencia==='Alta').length;
  document.getElementById('st-andamento').textContent= dados.filter(s=>s.status_geral&&s.status_geral.startsWith('Em análise')).length;
  document.getElementById('st-aprovado').textContent = dados.filter(s=>s.status_geral==='Aprovado').length;
  document.getElementById('st-reprovado').textContent= dados.filter(s=>s.status_geral==='Reprovado').length;

  COLUNAS.forEach(col => {
    const body  = document.getElementById('body-'+col);
    const cnt   = document.getElementById('cnt-'+col);
    const cards = filtrados.filter(s => (s.status_geral||'Aguardando análise') === col);
    cnt.textContent = cards.length;
    if (cards.length === 0) {
      body.innerHTML = '<div class="empty-col">Nenhuma solicitação</div>';
      return;
    }
    body.innerHTML = cards.map(s => renderCard(s)).join('');
  });
}

function renderCard(s) {
  const urgClass = 'tag-urg-'+(s.urgencia||'Baixa');
  const prods = produtos[s.protocolo] || [];
  const prodTxt = prods.length === 0 ? '—' : prods.length === 1 ? prods[0].produto : prods[0].produto + ' +' + (prods.length-1);
  const antec = s.dias_antecipacao ? s.dias_antecipacao+'d antecipação' : '';
  return `<div class="card" draggable="${ADMIN}"
    ${ADMIN ? `ondragstart="onDragStart(event,'${s.protocolo}')" ondragend="onDragEnd(event)"` : ''}
    onclick="abrirModal('${s.protocolo}')" style="${ADMIN?'':'cursor:default'}">
    <div class="card-prot">${s.protocolo}</div>
    <div class="card-rep">${s.representante||'—'}</div>
    <div class="card-pedido">Pedido: ${s.pedido||'—'}</div>
    <div class="card-tags">
      <span class="tag ${urgClass}">${s.urgencia||'—'}</span>
      ${s.prazo_maximo ? `<span class="tag tag-prazo">${s.prazo_maximo}d prazo</span>` : ''}
      ${antec ? `<span class="tag tag-antec">${antec}</span>` : ''}
    </div>
    <div class="card-prods">${prodTxt}</div>
    <div class="card-footer">
      <span class="card-data">${s.data_registro||''}</span>
      ${ADMIN ? `<button class="card-move-btn" onclick="event.stopPropagation();abrirModal('${s.protocolo}')">Mover →</button>` : ''}
    </div>
  </div>`;
}

// ─── DRAG AND DROP ────────────────────────────────────────────────────────────
function onDragStart(e, protocolo) {
  if (!ADMIN) { e.preventDefault(); return; }
  dragProtocolo = protocolo;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.col-body').forEach(b => b.classList.remove('drag-over'));
}

function onDragOver(e, col) {
  if (!ADMIN) return;
  e.preventDefault();
  document.querySelectorAll('.col-body').forEach(b => b.classList.remove('drag-over'));
  col.querySelector('.col-body').classList.add('drag-over');
}

function onDrop(e, status) {
  if (!ADMIN) return;
  e.preventDefault();
  document.querySelectorAll('.col-body').forEach(b => b.classList.remove('drag-over'));
  if (!dragProtocolo) return;
  const sol = dados.find(s => s.protocolo === dragProtocolo);
  if (!sol || sol.status_geral === status) return;
  abrirModalComStatus(dragProtocolo, status);
  dragProtocolo = null;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function abrirModal(protocolo) {
  cardAtual = dados.find(s => s.protocolo === protocolo);
  novoStatus = null;
  if (!cardAtual) return;
  renderModal();
  document.getElementById('modal-bg').classList.add('open');
}

function abrirModalComStatus(protocolo, status) {
  cardAtual = dados.find(s => s.protocolo === protocolo);
  novoStatus = status;
  if (!cardAtual) return;
  renderModal();
  document.getElementById('modal-bg').classList.add('open');
}

function renderModal() {
  const s = cardAtual;
  const prods = produtos[s.protocolo] || [];
  document.getElementById('modal-titulo').textContent = s.protocolo;

  const statusPill = st => {
    const cls = st==='Aprovado'?'aprovado':st==='Reprovado'?'reprovado':st&&st.startsWith('Em')?'em-analise':'pendente';
    return `<span class="status-pill ${cls}">${st||'Pendente'}</span>`;
  };

  const colBtns = COLUNAS.map(col => {
    const isCurr = (s.status_geral||'Aguardando análise') === col;
    const isNovo = novoStatus === col;
    const cls = (isCurr||isNovo) ? 'move-col-btn current' : 'move-col-btn';
    return `<button class="${cls}" onclick="selecionarStatus('${col}')">${col.replace('Em análise — ','')}</button>`;
  }).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <h4>Identificação</h4>
      <div class="modal-grid">
        <div class="modal-field"><span>Representante</span><b>${s.representante||'—'}</b></div>
        <div class="modal-field"><span>Pedido</span><b>${s.pedido||'—'}</b></div>
        <div class="modal-field"><span>Data emissão</span><b>${s.data_emissao||'—'}</b></div>
        <div class="modal-field"><span>Data solicitada</span><b>${s.data_solicitada||'—'}</b></div>
        <div class="modal-field"><span>Prazo máximo</span><b>${s.prazo_maximo||'—'} dias</b></div>
        <div class="modal-field"><span>Antecipação</span><b>${s.dias_antecipacao||'—'} dias</b></div>
        <div class="modal-field"><span>Urgência</span><b>${s.urgencia||'—'}</b></div>
        <div class="modal-field"><span>Motivo</span><b>${s.motivo||'—'}</b></div>
      </div>
      ${s.impacto ? `<div class="modal-field" style="margin-top:8px"><span>Impacto</span><b>${s.impacto}</b></div>` : ''}
    </div>

    <div class="modal-section">
      <h4>Produtos (${prods.length})</h4>
      <div class="prod-list">
        ${prods.length ? prods.map(p=>`<div class="prod-item"><span>${p.produto}</span><span>${p.prazo}d — Qtd ${p.qtd}</span></div>`).join('') : '<div class="prod-item">—</div>'}
      </div>
    </div>

    <div class="modal-section">
      <h4>Status atual</h4>
      <div class="status-track">
        ${statusPill(s.status_geral)}
        ${s.parecer_comercial ? `<span style="font-size:11px;color:var(--gray-500)">Comercial: ${s.parecer_comercial}</span>` : ''}
        ${s.parecer_pcp      ? `<span style="font-size:11px;color:var(--gray-500)">PCP: ${s.parecer_pcp}</span>` : ''}
        ${s.parecer_compras  ? `<span style="font-size:11px;color:var(--gray-500)">Compras: ${s.parecer_compras}</span>` : ''}
      </div>
    </div>

    ${ADMIN ? `
    <div class="move-section">
      <h4>Mover para</h4>
      <div class="move-cols" id="move-cols">${colBtns}</div>
      <div class="parecer-area" id="parecer-area" style="${novoStatus?'':'display:none'}">
        <label>Parecer / observação (opcional)</label>
        <textarea id="parecer-input" placeholder="Descreva o resultado da análise..."></textarea>
      </div>
    </div>` : ''}
  `;
}

function selecionarStatus(status) {
  novoStatus = status;
  document.querySelectorAll('.move-col-btn').forEach(b => b.classList.remove('current'));
  event.target.classList.add('current');
  document.getElementById('parecer-area').style.display = 'block';
}

async function salvarMovimentacao() {
  if (!novoStatus || !cardAtual) return;
  if (novoStatus === (cardAtual.status_geral||'Aguardando análise')) { fecharModalBtn(); return; }

  const parecer = (document.getElementById('parecer-input')?.value||'').trim();
  const agora   = new Date().toISOString();
  const setor   = novoStatus.includes('Comercial')?'comercial':novoStatus.includes('PCP')?'pcp':novoStatus.includes('Compras')?'compras':null;

  const patch = { status_geral: novoStatus };
  if (novoStatus === 'Aprovado' || novoStatus === 'Reprovado') { patch.status_final = novoStatus; patch.data_conclusao = agora; }
  if (setor && parecer) { patch['parecer_'+setor] = parecer; patch['data_'+setor] = agora; }
  if (setor && !parecer) { patch['data_'+setor] = agora; }

  document.getElementById('btn-salvar-modal').textContent = 'Salvando...';
  document.getElementById('btn-salvar-modal').disabled = true;

  try {
    const res = await fetch(SB_URL + '/rest/v1/solicitacoes?protocolo=eq.' + cardAtual.protocolo, {
      method:  'PATCH',
      headers: { ...SB_H, 'Prefer': 'return=minimal' },
      body:    JSON.stringify(patch)
    });

    if (!res.ok) throw new Error(await res.text());

    // Atualiza local
    const idx = dados.findIndex(s => s.protocolo === cardAtual.protocolo);
    if (idx !== -1) Object.assign(dados[idx], patch);

    fecharModalBtn();
    renderBoard();
    showToast('Card movido para "'+novoStatus+'"', 'success');
  } catch(e) {
    showToast('Erro ao salvar: '+e.message, 'error');
    console.error(e);
  } finally {
    document.getElementById('btn-salvar-modal').textContent = 'Confirmar movimentação';
    document.getElementById('btn-salvar-modal').disabled = false;
  }
}

function fecharModal(e) { if (e.target === document.getElementById('modal-bg')) fecharModalBtn(); }
function fecharModalBtn() { document.getElementById('modal-bg').classList.remove('open'); cardAtual=null; novoStatus=null; }

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, tipo='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+(tipo||''); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// ─── POLLING AUTOMÁTICO (a cada 30s) ─────────────────────────────────────────
// Aplica modo visual
const badge = document.getElementById('modo-badge');
if (ADMIN) {
  badge.textContent = 'Modo admin';
  badge.style.background = 'rgba(29,112,68,.5)';
  badge.style.borderColor = 'rgba(29,112,68,.8)';
  document.getElementById('btn-salvar-modal').style.display = '';
} else {
  badge.textContent = 'Modo visualização';
}

// Garante que o botão salvar reflete o modo ao abrir modal
const _origRenderModal = renderModal;
renderModal = function() {
  _origRenderModal();
  const btn = document.getElementById('btn-salvar-modal');
  if (btn) btn.style.display = ADMIN ? '' : 'none';
};

carregarDados();
setInterval(carregarDados, 30000);
</script>
</body>
</html>
